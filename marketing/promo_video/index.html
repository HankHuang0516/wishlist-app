<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist.ai Promotional Video</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Noto Sans TC", sans-serif;
            overflow: hidden;
        }

        #video-container {
            width: 100%;
            max-width: 1024px;
            aspect-ratio: 16/9;
            position: relative;
            background-color: #111;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center;
            transform-origin: center;
        }

        .slide.active {
            opacity: 1;
            animation: kenburns 20s infinite alternate;
        }

        /* Talking animation: subtle scale pulse */
        .slide.talking {
            animation: kenburns 20s infinite alternate, talk-pulse 0.3s infinite alternate;
        }

        @keyframes kenburns {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.15);
            }
        }

        @keyframes talk-pulse {
            from {
                filter: brightness(1);
            }

            to {
                filter: brightness(1.05);
                transform: scale(1.02);
            }

            /* Slight pop */
        }

        #subtitle-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            transition: transform 0.3s ease-out;
        }

        #subtitle-container.pop {
            transform: scale(1.05);
            /* Text pops when new line appears */
        }

        #subtitle {
            color: white;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            max-width: 80%;
            margin: 0 auto;
            line-height: 1.4;
            font-weight: 500;
        }

        #character-name {
            color: #fbbf24;
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: bold;
            display: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #333;
        }

        #progress-bar {
            height: 100%;
            background: #fbbf24;
            width: 0%;
            transition: width 0.1s linear;
        }

        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            flex-direction: column;
        }

        #play-btn {
            background: white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        #play-btn:hover {
            transform: scale(1.1);
        }

        #play-btn::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid #333;
            margin-left: 5px;
        }

        .loading-text {
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="video-container">
        <div id="slide1" class="slide" style="background-image: url('scene_01_gift_presentation_1769086407818.png');">
        </div>
        <div id="slide2" class="slide" style="background-image: url('scene_02_weird_gift_1769086428004.png');"></div>
        <div id="slide3" class="slide" style="background-image: url('scene_03_app_demo_1769086444427.png');"></div>
        <div id="slide4" class="slide" style="background-image: url('scene_04_happy_ending_1769086461319.png');"></div>

        <div id="subtitle-container">
            <div id="character-name"></div>
            <div id="subtitle"></div>
        </div>

        <div id="controls">
            <div id="progress-bar"></div>
        </div>

        <div id="play-overlay">
            <div id="play-btn"></div>
            <div class="loading-text" id="status-text">點擊開始播放 (含語音)</div>
        </div>
    </div>

    <script>
        const scriptData = [
            // Scene 1 - Duration tuned for speech
            { scene: 1, char: '阿強', text: '小美，祝我們交往三週年快樂！這是我找遍全網路，覺得最符合妳「知性美」的禮物！' },
            { scene: 1, char: '小美', text: '喔？這麼神祕？...阿強，這是一個...「太陽能自動旋轉轉經輪」嗎？' },

            // Scene 2
            { scene: 2, char: '阿強', text: '不止！它還有內建藍牙音響，可以一邊轉一邊播放佛經，還能順便給手機充電！是不是很有設計感？' },
            { scene: 2, char: '小美', text: '阿強，我是個視覺設計師，不是要出家。' },
            { scene: 2, char: '小美', text: '前年的「不銹鋼摺疊臉盆」我也收進倉庫了。你對禮物的品味，真的跟你的保修期一樣短。' },
            { scene: 2, char: '阿強', text: '我真的挑很久！我看蝦皮看了一整夜...' },
            { scene: 2, char: '小美', text: '其實我早就想說了，如果你跟我都用了這個 「Wishlist.ai」，你就不會買錯東西了。' },

            // Scene 3
            { scene: 3, char: '小美', text: 'Wishlist.ai，AI 智慧許願清單。只要貼上網址，3 秒鐘內就會自動識別圖片和價格。' },
            { scene: 3, char: '阿強', text: '喔？這麼快？連規格都抓到了？' },
            { scene: 3, char: '小美', text: '對啊！而且介面很有質感... 可以分享給妳，妳以後送我禮物從裡面挑就好！' },
            { scene: 3, char: '阿強', text: '所以...如果我買了清單裡的東西，它會標記已購買嗎？' },
            { scene: 3, char: '小美', text: '當然！這樣就不會有人重複送我同一支唇膏...也不會有人送我轉經輪。' },

            // Scene 4
            { scene: 4, char: '阿強', text: '哈哈...那這個轉經輪...' },
            { scene: 4, char: '小美', text: '拿去送你阿嬤吧。現在，立刻，下載 Wishlist.ai！' },
            { scene: 4, char: '阿強', text: '遵命！原來送禮物可以這麼智慧！' },
            { scene: 4, char: '小美', text: 'Wishlist.ai — 拯救直男，也拯救你的品味。' },
            { scene: 4, char: '旁白', text: 'Wishlist.ai — AI 智慧許願清單，讓每一份禮物都送到心坎裡。' },
        ];

        const slides = [
            document.getElementById('slide1'),
            document.getElementById('slide2'),
            document.getElementById('slide3'),
            document.getElementById('slide4')
        ];

        const subtitleEl = document.getElementById('subtitle');
        const subtitleContainer = document.getElementById('subtitle-container');
        const charNameEl = document.getElementById('character-name');
        const progressBar = document.getElementById('progress-bar');
        const playOverlay = document.getElementById('play-overlay');
        const statusText = document.getElementById('status-text');

        let isPlaying = false;
        let synth = window.speechSynthesis;
        let voices = [];
        let maleVoice = null;
        let femaleVoice = null;

        // Load voices
        function loadVoices() {
            voices = synth.getVoices();
            // Try to find Chinese voices
            const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('CN') || v.lang.includes('TW'));

            if (zhVoices.length > 0) {
                // Heuristic to guess gender based on name if available, otherwise just alternate
                // Chrome usually has "Google 普通话" which is female
                maleVoice = zhVoices.find(v => v.name.includes('Male') || v.name.includes('Danny')) || zhVoices[0];
                femaleVoice = zhVoices.find(v => v.name.includes('Female') || v.name.includes('Ya-Ling') || v.name.includes('Google') || v.name.includes('Hsiao')) || zhVoices[1] || zhVoices[0];

                // Fallback: If we picked the same voice, try to find another one
                if (maleVoice === femaleVoice && zhVoices.length > 1) {
                    maleVoice = zhVoices[1];
                }
            }
            statusText.textContent = `語音已就緒 (${voices.length} 聲音庫)`;
        }

        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }
        loadVoices(); // Try immediately

        playOverlay.addEventListener('click', startVideo);

        function startVideo() {
            if (isPlaying) return;
            isPlaying = true;
            playOverlay.style.display = 'none';

            runSequence(0);
        }

        function speak(text, char, callback) {
            if (synth.speaking) {
                synth.cancel();
            }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'zh-TW';
            utterThis.rate = 1.1; // Slightly faster for conversation

            // Assign voice
            if (char === '阿強') {
                if (maleVoice) utterThis.voice = maleVoice;
                utterThis.pitch = 0.9;
            } else if (char === '小美') {
                if (femaleVoice) utterThis.voice = femaleVoice;
                utterThis.pitch = 1.1;
            } else {
                // Narrator
                if (femaleVoice) utterThis.voice = femaleVoice;
                utterThis.pitch = 1.0;
            }

            utterThis.onend = function (event) {
                callback();
            };

            utterThis.onerror = function (event) {
                console.error('SpeechSynthesisUtterance.onerror', event);
                callback(); // Continue anyway
            }

            synth.speak(utterThis);
        }

        function runSequence(index) {
            if (index >= scriptData.length) {
                isPlaying = false;
                playOverlay.style.display = 'flex';
                statusText.textContent = '播放結束，點擊重播';
                progressBar.style.width = '100%';
                return;
            }

            const data = scriptData[index];
            const progress = (index / scriptData.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Update Slide
            const currentSceneIdx = data.scene - 1;
            slides.forEach((slide, idx) => {
                if (idx === currentSceneIdx) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });

            // Add "talking" visual effect to active slide
            const activeSlide = slides[currentSceneIdx];
            activeSlide.classList.add('talking');


            // Update Subtitle
            charNameEl.style.display = 'block';
            charNameEl.textContent = data.char;
            subtitleEl.textContent = data.text;

            // Pop effect
            subtitleContainer.classList.remove('pop');
            void subtitleContainer.offsetWidth; // trigger reflow
            subtitleContainer.classList.add('pop');

            // Speak
            speak(data.text, data.char, () => {
                // After finished speaking
                activeSlide.classList.remove('talking');

                // Small pause between lines
                setTimeout(() => {
                    runSequence(index + 1);
                }, 500);
            });
        }

    </script>
</body>

</html>
